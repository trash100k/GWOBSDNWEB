# Render Blueprint — deploy the GAELWORX obsidian hero as a static site.
# Docs: https://render.com/docs/blueprint-spec
#
# One-click: in Render → New → Blueprint → connect this repo/branch.
# Render reads this file and provisions a free static site automatically.
services:
  - type: web
    name: gaelworx-obsidian-hero
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Vite outputs hashed asset filenames — safe to cache hard.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    # Single-page app: send unknown paths to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
